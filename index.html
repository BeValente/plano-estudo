<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║                        STUDYTRACK v2                            ║
  ║             Planner de Estudo Pessoal e Personalizável          ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  Este ficheiro é uma aplicação web completa numa única página.  ║
  ║  Está dividido em 3 partes:                                     ║
  ║    1. CSS  → define o visual (cores, tamanhos, layout)          ║
  ║    2. HTML → define a estrutura (o que existe na página)        ║
  ║    3. JS   → define a lógica (o que acontece ao clicar, etc.)  ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="pt" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StudyTrack</title>

  <!--
    Fontes do Google Fonts (carregadas da internet):
    - Syne       → fonte display (títulos, números grandes)
    - DM Sans    → fonte do corpo (texto normal, botões)
  -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    /*
    ================================================================
    SECÇÃO 1: CSS — ESTILOS VISUAIS
    ================================================================
    O CSS controla tudo o que é visual: cores, tamanhos,
    espaçamentos, bordas, animações.

    Um "seletor" (ex: .card) aponta para um elemento HTML.
    As propriedades dentro de { } definem o aspeto desse elemento.
    ================================================================
    */


    /* ── VARIÁVEIS GLOBAIS (tema escuro por padrão) ─────────────────
       :root aplica-se à raiz do documento (toda a página).
       Variáveis CSS começam com -- e são reutilizáveis em todo o CSS.
       Assim, se quiseres mudar uma cor, mudas só aqui.
    ─────────────────────────────────────────────────────────────── */
    :root {
      /* Fundos — do mais escuro ao mais claro */
      --bg:  #0d0d11;  /* fundo da página */
      --bg2: #13131a;  /* fundo de cards e sidebar */
      --bg3: #1a1a24;  /* fundo de inputs e chips */
      --bg4: #22222f;  /* fundo de barras de progresso */
      --bg5: #2a2a3a;  /* scrollbar */

      /* Bordas com transparência */
      --bd:  rgba(255,255,255,0.06);  /* borda subtil */
      --bd2: rgba(255,255,255,0.10);  /* borda normal */
      --bd3: rgba(255,255,255,0.16);  /* borda de destaque */

      /* Cores de texto */
      --tx:  #e8e8f2;  /* texto principal (quase branco) */
      --tx2: #9090b0;  /* texto secundário (cinzento médio) */
      --tx3: #55556a;  /* texto terciário (cinzento escuro) */

      /* Cor de destaque principal (roxo) */
      --ac:  #7c6af7;  /* roxo normal */
      --ac2: #a594f9;  /* roxo claro */
      --gl:  rgba(124,106,247,0.18); /* brilho roxo (para fundo ativo) */

      /* Cores semânticas — usadas para significado */
      --gn: #34d399;  /* verde  → sucesso, concluído */
      --am: #fbbf24;  /* âmbar  → aviso, em andamento */
      --rd: #f87171;  /* vermelho → erro, atrasado */
      --bl: #60a5fa;  /* azul   → informação */
      --tl: #2dd4bf;  /* teal   → estatísticas */
      --pk: #f472b6;  /* rosa   → decorativo */

      /* Raios de borda (cantos arredondados) */
      --r:  12px;  /* normal */
      --rs: 8px;   /* pequeno */
      --rl: 18px;  /* grande */

      /* Tamanho da sidebar */
      --sb: 232px;

      /* Fontes */
      --df: 'Syne', sans-serif;    /* display (títulos) */
      --db: 'DM Sans', sans-serif; /* body (texto normal) */
    }

    /* ── TEMA CLARO ──────────────────────────────────────────────────
       Quando o elemento <html> tiver o atributo data-light,
       estas variáveis sobrepõem as do tema escuro acima.
       O JavaScript alterna este atributo ao clicar em "Modo Claro".
    ─────────────────────────────────────────────────────────────── */
    [data-light] {
      --bg:  #f0f0f8;
      --bg2: #ffffff;
      --bg3: #eaeaf4;
      --bg4: #e0e0ee;
      --bg5: #d4d4e8;
      --bd:  rgba(0,0,0,0.06);
      --bd2: rgba(0,0,0,0.10);
      --bd3: rgba(0,0,0,0.15);
      --tx:  #1a1a2e;
      --tx2: #5a5a80;
      --tx3: #9090b0;
      --gl:  rgba(124,106,247,0.10);
    }

    /* ── RESET E BASE ────────────────────────────────────────────────
       * apanha TODOS os elementos.
       box-sizing: border-box faz com que padding e border
       sejam incluídos na largura total (evita surpresas de layout).
    ─────────────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;               /* ocupa toda a altura da janela */
      font-family: var(--db);
      background: var(--bg);
      color: var(--tx);
      font-size: 14px;
      line-height: 1.6;           /* espaçamento entre linhas */
    }

    /* Scrollbar personalizada — só funciona em Chrome/Edge */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 4px; }

    /* Garante que botões, inputs e selects usam a mesma fonte */
    button        { font-family: var(--db); cursor: pointer; }
    input, select { font-family: var(--db); }

    /* Estilo base dos links */
    a       { color: var(--ac2); text-decoration: none; }
    a:hover { text-decoration: underline; }


    /* ── LAYOUT PRINCIPAL ────────────────────────────────────────────
       A app usa display:flex para colocar sidebar + conteúdo
       lado a lado, ocupando toda a altura da janela.
    ─────────────────────────────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;    /* 100% da altura da janela do browser */
      overflow: hidden; /* impede scroll na raiz; cada parte faz o seu */
    }


    /* ── SIDEBAR (menu lateral) ──────────────────────────────────────
       Coluna fixa à esquerda com os botões de navegação.
    ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sb);       /* largura fixa definida na variável */
      flex-shrink: 0;         /* não encolhe quando a janela diminui */
      background: var(--bg2);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column; /* empilha os itens verticalmente */
      overflow-y: auto;       /* scroll se o menu for muito longo */
    }

    /* Logo no topo da sidebar */
    .logo-wrap { padding: 20px 16px 12px; border-bottom: 1px solid var(--bd); }
    .logo {
      font-family: var(--df);
      font-size: 18px;
      font-weight: 800;
      /* Gradiente de texto — técnica especial */
      background: linear-gradient(135deg, var(--ac2), var(--tl));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { font-size: 9px; color: var(--tx3); text-transform: uppercase; letter-spacing: .08em; }

    /* Título de secção dentro da sidebar ("PRINCIPAL", etc.) */
    .nsec { padding: 12px 10px 3px; font-size: 9px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .1em; }

    /* Botão de navegação individual */
    .nb {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      margin: 1px 5px;
      border-radius: var(--rs);
      border: none;
      background: none;
      color: var(--tx2);
      font-size: 13px;
      width: calc(100% - 10px);
      text-align: left;
      cursor: pointer;
      transition: all .15s; /* animação suave em todos as mudanças */
    }
    .nb:hover { background: var(--bg3); color: var(--tx); }
    .nb.on    { background: var(--gl); color: var(--ac2); font-weight: 500; } /* ativo */
    .nb svg   { width: 14px; height: 14px; flex-shrink: 0; opacity: .7; }
    .nb.on svg { opacity: 1; }

    /* Badge numérico (ex: número de matérias) */
    .nbg {
      margin-left: auto; /* empurra para a direita */
      background: var(--ac);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 10px;
      min-width: 16px;
      text-align: center;
    }

    /* Rodapé da sidebar (botão de tema) */
    .sfot { margin-top: auto; padding: 12px; border-top: 1px solid var(--bd); }
    .tbtn {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; border-radius: var(--rs);
      background: var(--bg3); border: none; color: var(--tx2);
      font-size: 12px; width: 100%; cursor: pointer;
    }
    .tbtn:hover { color: var(--tx); }


    /* ── ÁREA PRINCIPAL (conteúdo à direita) ─────────────────────────
    ─────────────────────────────────────────────────────────────── */
    .main {
      flex: 1;          /* ocupa todo o espaço restante */
      overflow-y: auto; /* scroll apenas aqui */
      display: flex;
      flex-direction: column;
    }

    /* Barra de topo (título da página atual) */
    .topbar {
      padding: 14px 22px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      position: sticky; /* fica fixo no topo ao fazer scroll */
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px); /* desfoque de vidro atrás */
    }
    .ptitle { font-family: var(--df); font-size: 19px; font-weight: 700; }
    .psub   { font-size: 10px; color: var(--tx3); margin-top: 1px; }

    /* Área de conteúdo com padding */
    .content { padding: 18px 22px; flex: 1; }


    /* ── SECÇÕES DE CONTEÚDO ─────────────────────────────────────────
       Cada página (Dashboard, Matérias, etc.) é uma .sec.
       Por padrão estão escondidas (display:none).
       A classe .on mostra a secção ativa.
       A animação fi faz um fade + slide suave ao mudar de página.
    ─────────────────────────────────────────────────────────────── */
    .sec    { display: none; }
    .sec.on { display: block; animation: fi .2s ease; }

    @keyframes fi {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }


    /* ── CARDS ───────────────────────────────────────────────────────
       Caixas com fundo e borda, usadas para agrupar conteúdo.
    ─────────────────────────────────────────────────────────────── */
    .card   { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 14px; }
    .cdsm   { padding: 10px 13px; } /* versão pequena — menos padding */


    /* ── GRELHAS (grid layouts) ──────────────────────────────────────
       CSS Grid divide o espaço em colunas automaticamente.
       g2 = 2 colunas, g3 = 3, g4 = 4.
       @media adapta para ecrãs pequenos (abaixo de 900px).
    ─────────────────────────────────────────────────────────────── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    /* Ecrãs pequenos: reduz o número de colunas */
    @media (max-width: 900px) {
      .g4 { grid-template-columns: repeat(2, 1fr); }
      .g3 { grid-template-columns: repeat(2, 1fr); }
      .g2 { grid-template-columns: 1fr; }
    }

    /* ── RESPONSIVO MOBILE ────────────────────────────────────────────
       Abaixo de 640px (telemóvel):
       - A sidebar desaparece do lado esquerdo
       - Aparece uma barra de navegação em baixo (tab bar)
       - O conteúdo ocupa o ecrã todo
       - Padding reduzido para aproveitar o espaço
    ─────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {

      /* App passa a ser coluna em vez de linha */
      .app {
        flex-direction: column;
        height: 100vh;
      }

      /* Sidebar esconde-se completamente no mobile */
      .sidebar { display: none; }

      /* Conteúdo principal ocupa toda a largura */
      .main {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 70px; /* espaço para a tab bar em baixo */
      }

      /* Topbar mais compacta */
      .topbar {
        padding: 12px 16px;
      }
      .ptitle { font-size: 16px; }
      .psub { display: none; } /* esconde subtítulo para poupar espaço */

      /* Conteúdo com menos padding */
      .content { padding: 14px 16px; }

      /* Grids de 4 passam a 2 colunas */
      .g4 { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .g3 { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .g2 { grid-template-columns: 1fr; gap: 10px; }

      /* Formulários em coluna */
      .ir { flex-direction: column; }
      .ir input, .ir select { min-width: 0; width: 100%; }

      /* Horário em 1 coluna */
      #hor-grid { grid-template-columns: 1fr !important; }

      /* Calendário — células menores */
      .cday { min-height: 44px; padding: 3px; }
      .cdn { font-size: 9px; }
      .cev { font-size: 7px; }

      /* Projetos em 1 coluna */
      #proj-list .g2 { grid-template-columns: 1fr; }

      /* TAB BAR — barra de navegação fixa em baixo */
      .tab-bar {
        display: flex !important; /* mostrada só no mobile */
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 62px;
        background: var(--bg2);
        border-top: 1px solid var(--bd2);
        z-index: 100;
        padding: 0 4px;
        padding-bottom: env(safe-area-inset-bottom); /* iPhone notch */
      }

      /* Cada botão da tab bar */
      .tab-bar button {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        background: none;
        border: none;
        color: var(--tx3);
        font-size: 9px;
        font-weight: 600;
        cursor: pointer;
        padding: 6px 2px;
        border-radius: var(--rs);
        transition: all .15s;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .tab-bar button svg {
        width: 20px;
        height: 20px;
      }
      .tab-bar button.on {
        color: var(--ac2);
      }
      .tab-bar button.on svg {
        filter: drop-shadow(0 0 4px var(--ac));
      }

      /* Botão de tema aparece no topbar no mobile */
      .mobile-theme {
        display: flex !important;
      }
    }

    /* Tab bar escondida no desktop */
    .tab-bar { display: none; }
    .mobile-theme { display: none; }


    /* ── CARDS DE ESTATÍSTICAS ───────────────────────────────────────
       Os 4 cards de números no topo de Dashboard e Análise.
    ─────────────────────────────────────────────────────────────── */
    .sc { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 13px 15px; }
    .sn { font-family: var(--df); font-size: 26px; font-weight: 700; line-height: 1.1; } /* número grande */
    .sl { font-size: 9px; color: var(--tx3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; } /* label */
    .ss { font-size: 10px; color: var(--tx2); margin-top: 2px; } /* subtexto */


    /* ── BARRAS DE PROGRESSO ─────────────────────────────────────────
       Estrutura: .pr > .ph (header) + .pt (track) > .pf (fill)
       A largura de .pf é definida dinamicamente pelo JavaScript.
    ─────────────────────────────────────────────────────────────── */
    .pr { margin-bottom: 10px; }
    .ph { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .pn { font-size: 12px; font-weight: 500; }            /* nome da matéria */
    .pp { font-size: 10px; color: var(--tx2); }           /* percentagem */
    .pt { height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; } /* trilho cinzento */
    .pf { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); } /* preenchimento colorido */


    /* ── CÍRCULOS DE PROGRESSO (SVG) ─────────────────────────────────
       Gerados pelo JavaScript com SVG.
       .circ é o wrapper, .clbl é o texto no centro.
    ─────────────────────────────────────────────────────────────── */
    .circ { position: relative; flex-shrink: 0; }
    .circ svg { transform: rotate(-90deg); } /* começa do topo, não da direita */
    .clbl {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%); /* centra perfeitamente */
      font-family: var(--df);
      font-weight: 700;
    }


    /* ── FORMULÁRIOS (linha de inputs + botão) ───────────────────────
       .ir = input row. Os inputs dentro crescem para preencher o espaço.
    ─────────────────────────────────────────────────────────────── */
    .ir { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

    .ir input, .ir select {
      flex: 1;
      min-width: 90px;
      padding: 7px 11px;
      background: var(--bg3);
      border: 1px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--tx);
      font-size: 13px;
      outline: none;
      transition: all .15s;
    }
    .ir input:focus, .ir select:focus {
      border-color: var(--ac);
      box-shadow: 0 0 0 2px var(--gl); /* anel de foco */
    }
    .ir input::placeholder { color: var(--tx3); }
    .ir select option      { background: var(--bg3); }

    /* Input de cor — campo especial para escolher cor */
    input[type=color] { width: 36px; padding: 3px; flex: 0; cursor: pointer; border-radius: 5px; }

    /* Input de data — usa color-scheme para adaptar ao tema */
    input[type=date] { color-scheme: dark; }


    /* ── BOTÕES ──────────────────────────────────────────────────────
       .btn = base, .bp = primary (roxo), .bg = ghost (transparente)
       .bx = botão de apagar (×), sem fundo
    ─────────────────────────────────────────────────────────────── */
    .btn { padding: 7px 15px; border-radius: var(--rs); font-size: 13px; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
    .bp  { background: var(--ac); color: #fff; }
    .bp:hover { background: var(--ac2); transform: translateY(-1px); } /* sobe levemente */
    .bg  { background: var(--bg3); color: var(--tx2); border: 1px solid var(--bd2); }
    .bg:hover { background: var(--bg4); color: var(--tx); }
    .bx  { background: none; border: none; color: var(--tx3); padding: 2px 5px; font-size: 15px; cursor: pointer; border-radius: 4px; }
    .bx:hover { color: var(--rd); } /* fica vermelho ao passar */


    /* ── TABS (abas de filtro) ───────────────────────────────────────
       Ex: "Todas | Pendentes | Concluídas" nas tarefas.
       Fundo cinzento com a aba ativa em destaque branco.
    ─────────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--rs); padding: 3px; margin-bottom: 12px; width: fit-content; }
    .tab  { padding: 5px 13px; border-radius: 6px; font-size: 12px; border: none; background: none; color: var(--tx2); cursor: pointer; transition: all .15s; }
    .tab.on { background: var(--bg2); color: var(--tx); font-weight: 500; box-shadow: 0 1px 3px rgba(0,0,0,.2); }


    /* ── CHIPS (filtros por matéria) ─────────────────────────────────
       Pequenas pílulas clicáveis para filtrar por matéria.
    ─────────────────────────────────────────────────────────────── */
    .chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip  { padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--bd2); background: var(--bg3); color: var(--tx2); cursor: pointer; transition: all .15s; }
    .chip.on { color: #fff; border-color: transparent; }


    /* ── CABEÇALHO DE SECÇÃO ─────────────────────────────────────────
       Linha com título à esquerda e ação opcional à direita.
    ─────────────────────────────────────────────────────────────── */
    .sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .st { font-family: var(--df); font-size: 11px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .08em; }

    /* Linha divisória horizontal */
    .div { height: 1px; background: var(--bd); margin: 16px 0; }

    /* Estado vazio (quando não há dados) */
    .empty { text-align: center; padding: 32px 14px; color: var(--tx3); font-size: 13px; }
    .ei    { font-size: 26px; margin-bottom: 5px; opacity: .4; } /* emoji grande */


    /* ── ITEM DE MATÉRIA ─────────────────────────────────────────────
       Linha com bolinha colorida, nome, slider de progresso e círculo.
    ─────────────────────────────────────────────────────────────── */
    .subi { display: flex; align-items: center; gap: 9px; padding: 9px 13px; background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--rs); margin-bottom: 5px; transition: all .15s; }
    .subi:hover { border-color: var(--bd2); }
    .dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; } /* bolinha de cor */


    /* ── ITEM DE TAREFA / CONTEÚDO ───────────────────────────────────
       Linha com checkbox, texto, data opcional e tag de matéria.
       .dn = done (concluído) — fica transparente com texto riscado.
    ─────────────────────────────────────────────────────────────── */
    .ti { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--rs); margin-bottom: 4px; transition: all .15s; }
    .ti:hover { border-color: var(--bd2); }
    .ti.dn { opacity: .45; }                                     /* concluído: quase transparente */
    .ti.dn .tx { text-decoration: line-through; color: var(--tx3); } /* texto riscado */
    .ti input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; accent-color: var(--ac); }
    .tx  { flex: 1; font-size: 13px; }           /* texto principal */
    .tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; color: #fff; flex-shrink: 0; white-space: nowrap; } /* badge colorido */
    .tdt { font-size: 10px; color: var(--tx3); flex-shrink: 0; }  /* data */
    .meta{ font-size: 10px; color: var(--tx3); margin-top: 1px; } /* metadados secundários */


    /* ── ITEM DE RECURSO ─────────────────────────────────────────────
       Linha com ícone (emoji), título, URL clicável e tag.
    ─────────────────────────────────────────────────────────────── */
    .ri  { display: flex; align-items: center; gap: 9px; padding: 9px 13px; background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--rs); margin-bottom: 4px; transition: all .15s; }
    .ri:hover { border-color: var(--bd2); }
    .ric { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; } /* quadrado com emoji */
    .rif { flex: 1; min-width: 0; }    /* info do recurso (flex evita overflow) */
    .rit { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* título com ellipsis */
    .riu { font-size: 10px; color: var(--tx3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* URL com ellipsis */


    /* ── CARD DE PROJETO ─────────────────────────────────────────────
       Card clicável que alterna entre feito/não feito.
       .dn = done — fica semi-transparente com check verde.
    ─────────────────────────────────────────────────────────────── */
    .pc  { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 13px; transition: all .15s; cursor: pointer; }
    .pc:hover { border-color: var(--bd2); }
    .pc.dn { opacity: .5; }
    .pch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--bd3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; } /* círculo de check */
    .pc.dn .pch { background: var(--gn); border-color: var(--gn); color: #000; } /* verde quando concluído */
    .pname { font-size: 13px; font-weight: 600; flex: 1; }
    .pdesc { font-size: 11px; color: var(--tx2); margin: 5px 0; line-height: 1.5; }
    .pmeta { font-size: 10px; color: var(--tx3); }


    /* ── CALENDÁRIO ──────────────────────────────────────────────────
       Grelha 7x6 com os dias do mês.
       Cada .cday é uma célula clicável.
    ─────────────────────────────────────────────────────────────── */
    .cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .cmon    { font-family: var(--df); font-size: 17px; font-weight: 700; flex: 1; text-align: center; }
    .cbtn    { background: var(--bg3); border: 1px solid var(--bd2); border-radius: var(--rs); padding: 5px 9px; color: var(--tx2); cursor: pointer; font-size: 14px; transition: all .15s; }
    .cbtn:hover { background: var(--bg4); color: var(--tx); }

    /* Grelha de 7 colunas (uma por dia da semana) */
    .cgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cdow  { font-size: 9px; font-weight: 700; color: var(--tx3); text-align: center; padding: 4px 0; text-transform: uppercase; } /* cabeçalho: Seg, Ter... */

    .cday { min-height: 58px; background: var(--bg3); border: 1px solid var(--bd); border-radius: var(--rs); padding: 4px; cursor: pointer; transition: all .15s; overflow: hidden; }
    .cday:hover { border-color: var(--bd2); }
    .cday.om { opacity: .25; }        /* dia do mês anterior/seguinte */
    .cday.td { border-color: var(--ac); box-shadow: 0 0 0 1px var(--ac); } /* hoje */

    .cdn { font-size: 10px; font-weight: 600; margin-bottom: 2px; } /* número do dia */
    .cev { font-size: 8px; font-weight: 700; padding: 1px 3px; border-radius: 2px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; } /* evento na célula */
    .cmr { font-size: 8px; color: var(--tx3); } /* "+2 mais" */


    /* ── BLOCO DE HORÁRIO ────────────────────────────────────────────
       Cada dia da semana é uma coluna .sdcard.
       Dentro, os blocos de estudo .sblk ficam agrupados por período.
    ─────────────────────────────────────────────────────────────── */
    .sdcard  { background: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 13px; min-width: 0; }
    .sdtitle { font-family: var(--df); font-size: 14px; font-weight: 700; margin-bottom: 1px; }
    .sdh     { font-size: 10px; color: var(--tx3); margin-bottom: 8px; }

    /* Label de período (MANHÃ / TARDE / NOITE) */
    .sper { font-size: 9px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .07em; margin: 7px 0 4px; display: flex; align-items: center; gap: 3px; }

    /* Bloco de estudo individual */
    .sblk { border-radius: var(--rs); padding: 7px 9px; margin-bottom: 3px; border: 1px solid transparent; position: relative; } /* position:relative para botão × absoluto */
    .sbn  { font-size: 12px; font-weight: 700; }  /* nome da matéria */
    .sbt  { font-size: 10px; opacity: .8; margin-top: 1px; } /* hora */
    .sbd  { font-size: 11px; opacity: .75; margin-top: 1px; } /* descrição */
    .sbr  { font-size: 10px; opacity: .65; margin-top: 2px; } /* duração */

    /* Legenda de cores das matérias no horário */
    .leg  { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 12px; }
    .legi { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--tx2); }
    .legd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; } /* bolinha de cor */

  </style>
</head>
<body>

<!--
  ================================================================
  SECÇÃO 2: HTML — ESTRUTURA DA PÁGINA
  ================================================================
  O HTML define o esqueleto — os elementos que existem na página.
  Elementos têm:
    - class="..."  → ligação ao CSS (estilo visual)
    - id="..."     → ligação ao JavaScript (comportamento)
    - onclick="..."→ função JS chamada ao clicar
  ================================================================
-->

<div class="app">

  <!-- ════════════════════════════════════════════════
       SIDEBAR — menu de navegação lateral
       Os botões chamam a função go('nomePagina', this)
       que mostra/esconde as secções corretas.
  ════════════════════════════════════════════════ -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo">StudyTrack</div>
      <div class="logo-sub">Plano de Estudo</div>
    </div>

    <!-- Grupo de navegação principal -->
    <div class="nsec">Principal</div>

    <button class="nb on" onclick="go('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>

    <button class="nb" onclick="go('materias',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Matérias
      <span class="nbg" id="nb-m">0</span>  <!-- badge com contagem -->
    </button>

    <button class="nb" onclick="go('conteudos',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Conteúdos
    </button>

    <button class="nb" onclick="go('horario',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Horário
    </button>

    <button class="nb" onclick="go('calendario',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Calendário
    </button>

    <button class="nb" onclick="go('tarefas',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Tarefas
      <span class="nbg" id="nb-t" style="display:none">0</span>
    </button>

    <button class="nb" onclick="go('projetos',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20V10M17 20V4M22 20h.01"/></svg>
      Projetos
    </button>

    <button class="nb" onclick="go('recursos',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Recursos
    </button>

    <button class="nb" onclick="go('analise',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Análise
    </button>

    <!-- Rodapé da sidebar: botão para alternar tema claro/escuro -->
    <div class="sfot">
      <button class="tbtn" onclick="toggleTheme()">
        <span id="ti">☀️</span>
        <span id="tl">Modo Claro</span>
      </button>
    </div>
  </aside>


  <!-- ════════════════════════════════════════════════
       ÁREA PRINCIPAL — topbar + conteúdo dinâmico
  ════════════════════════════════════════════════ -->
  <main class="main">

    <!-- Barra de topo — título muda conforme a página ativa -->
    <div class="topbar">
      <div>
        <div class="ptitle" id="pt">Dashboard</div>
        <div class="psub"   id="ps">Visão geral do plano</div>
      </div>
      <button class="mobile-theme tbtn" onclick="toggleTheme()" style="padding:7px 10px;border-radius:var(--rs)">
        <span id="ti2">☀️</span>
      </button>
    </div>

    <!-- Área de conteúdo — contém todas as secções -->
    <div class="content">


      <!-- ══════════════════════════════════════════
           PÁGINA: DASHBOARD
           Visão geral: stats, progresso, pendentes,
           e conteúdos a estudar.
           Tudo preenchido dinamicamente pelo JS.
      ══════════════════════════════════════════ -->
      <div class="sec on" id="sec-dashboard">
        <!-- 4 cards de estatísticas (preenchidos pelo JS) -->
        <div class="g4" id="d-stats" style="margin-bottom:16px"></div>

        <div class="g2">
          <!-- Coluna esquerda: barras de progresso por matéria -->
          <div>
            <div class="sh"><span class="st">Progresso por Matéria</span></div>
            <div id="d-prog"></div>
          </div>
          <!-- Coluna direita: tarefas pendentes (máx 5) -->
          <div>
            <div class="sh"><span class="st">Tarefas Pendentes</span></div>
            <div id="d-tasks"></div>
          </div>
        </div>

        <div class="div"></div>

        <!-- Conteúdos pendentes (máx 6, em grelha 2 colunas) -->
        <div class="sh"><span class="st">Conteúdos a Estudar</span></div>
        <div id="d-cont"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: MATÉRIAS
           Formulário para adicionar matéria com cor.
           Lista de matérias com slider de progresso.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-materias">
        <!-- Formulário de adição -->
        <div class="ir">
          <input id="mn" placeholder="Nome da matéria..."/>
          <input id="mp" placeholder="Professor (opcional)..." style="max-width:170px"/>
          <input id="mc" type="color" value="#7c6af7"/>  <!-- seletor de cor -->
          <button class="btn bp" onclick="addMat()">+ Adicionar</button>
        </div>
        <!-- Lista de matérias (preenchida pelo JS) -->
        <div id="mat-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: CONTEÚDOS
           Tópicos de estudo por matéria e semana.
           Filtros por estado e por matéria.
           Agrupados por semana automaticamente.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-conteudos">
        <div class="ir">
          <input id="cn" placeholder="Tópico / conteúdo..." onkeydown="if(event.key==='Enter')addCont()"/>
          <select id="cm"></select>  <!-- preenchido dinamicamente com as matérias -->
          <input id="cw" type="number" min="1" max="52" placeholder="Semana" style="max-width:80px"/>
          <select id="ct2">
            <option value="obrigatorio">Obrigatório</option>
            <option value="extra">Extra</option>
            <option value="revisao">Revisão</option>
          </select>
          <button class="btn bp" onclick="addCont()">+ Adicionar</button>
        </div>
        <!-- Tabs de filtro por estado -->
        <div class="tabs">
          <button class="tab on" onclick="cfil('todas',this)">Todos</button>
          <button class="tab"    onclick="cfil('pendentes',this)">Pendentes</button>
          <button class="tab"    onclick="cfil('feitos',this)">Concluídos</button>
        </div>
        <!-- Chips de filtro por matéria (preenchidos pelo JS) -->
        <div class="chips" id="cc"></div>
        <!-- Lista de conteúdos agrupados por semana -->
        <div id="cont-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: HORÁRIO
           Blocos de estudo com hora início/fim,
           descrição e dia da semana.
           Agrupados por manhã/tarde/noite.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-horario">
        <!-- Formulário de adição de bloco -->
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <select id="hs"></select>  <!-- matéria -->
          <input id="ht1" type="time" value="09:00" style="padding:7px 10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:12px;outline:none"/>
          <span style="color:var(--tx3);font-size:11px">até</span>
          <input id="ht2" type="time" value="11:00" style="padding:7px 10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:12px;outline:none"/>
          <input id="hd2" placeholder="Descrição (ex: Teoria + Exercícios)..." style="flex:1;min-width:130px;padding:7px 11px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none"/>
          <select id="hd" style="padding:7px 11px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
            <option value="0">Segunda</option>
            <option value="1">Terça</option>
            <option value="2">Quarta</option>
            <option value="3">Quinta</option>
            <option value="4">Sexta</option>
            <option value="5">Sábado</option>
            <option value="6">Domingo</option>
          </select>
          <button class="btn bp" onclick="addBlock()">+ Bloco</button>
        </div>
        <!-- Legenda de cores das matérias -->
        <div class="leg" id="hor-leg"></div>
        <!-- Grelha de 5 colunas (Seg-Sex) -->
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px" id="hor-grid"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: CALENDÁRIO
           Vista mensal com navegação mês a mês.
           Mostra eventos, testes e tarefas nos dias.
           Formulário para adicionar eventos.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-calendario">
        <!-- Navegação de mês -->
        <div class="cal-nav">
          <button class="cbtn" onclick="calNav(-1)">‹</button>    <!-- mês anterior -->
          <div class="cmon" id="cmon"></div>                       <!-- "Maio 2026" -->
          <button class="cbtn" onclick="calNav(1)">›</button>     <!-- mês seguinte -->
          <button class="cbtn" onclick="calToday()" style="font-size:11px">Hoje</button>
        </div>
        <!-- Grelha do calendário (preenchida pelo JS) -->
        <div class="cgrid" id="cgrid"></div>

        <div class="div"></div>

        <!-- Formulário de adição de evento -->
        <div class="sh"><span class="st">Adicionar Evento</span></div>
        <div class="ir">
          <input id="et" placeholder="Título do evento..."/>
          <input id="ed" type="date"/>
          <select id="em"></select>  <!-- matéria associada -->
          <select id="ety" style="padding:7px 11px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
            <option value="estudo">Estudo</option>
            <option value="teste">Teste/Exame</option>
            <option value="entrega">Entrega</option>
            <option value="outro">Outro</option>
          </select>
          <button class="btn bp" onclick="addEv()">+ Evento</button>
        </div>
        <!-- Lista de eventos do mês atual -->
        <div id="ev-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: TAREFAS
           Checklist com data de entrega opcional.
           Filtra por estado: todas/pendentes/feitas.
           Tarefas atrasadas ficam a vermelho.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-tarefas">
        <div class="ir">
          <input id="tn" placeholder="Descrição da tarefa..." onkeydown="if(event.key==='Enter')addTask()"/>
          <select id="tm"></select>
          <input id="tdd" type="date"/>
          <button class="btn bp" onclick="addTask()">+ Adicionar</button>
        </div>
        <div class="tabs">
          <button class="tab on" onclick="tfil('todas',this)">Todas</button>
          <button class="tab"    onclick="tfil('pendentes',this)">Pendentes</button>
          <button class="tab"    onclick="tfil('feitas',this)">Concluídas</button>
        </div>
        <div id="task-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: PROJETOS
           Cards clicáveis de projetos práticos.
           Clicar no card alterna entre feito/não feito.
           Barra de progresso global no topo.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-projetos">
        <div class="ir">
          <input id="prn" placeholder="Nome do projeto..."/>
          <input id="prd" placeholder="Descrição breve..."/>
          <select id="prm"></select>
          <input id="prw" type="number" placeholder="Semana início" min="1" style="max-width:110px"/>
          <button class="btn bp" onclick="addProj()">+ Projeto</button>
        </div>
        <!-- Barra de progresso global dos projetos -->
        <div id="proj-st" style="margin-bottom:12px"></div>
        <!-- Grid de cards de projetos -->
        <div id="proj-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: RECURSOS
           Links e materiais de apoio com emoji de tipo.
           Filtra por matéria com chips.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-recursos">
        <div class="ir">
          <input id="rn" placeholder="Título do recurso..."/>
          <input id="ru" placeholder="URL (https://...)"/>
          <select id="rm"></select>
          <select id="rtp" style="padding:7px 11px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
            <option value="📺">Vídeo</option>
            <option value="📄">Artigo</option>
            <option value="📘">Livro</option>
            <option value="🎧">Podcast</option>
            <option value="🛠">Ferramenta</option>
            <option value="🔗">Outro</option>
          </select>
          <button class="btn bp" onclick="addRes()">+ Adicionar</button>
        </div>
        <!-- Chips de filtro por matéria -->
        <div class="chips" id="rc"></div>
        <div id="res-list"></div>
      </div>


      <!-- ══════════════════════════════════════════
           PÁGINA: ANÁLISE
           Estatísticas completas: stats globais,
           barras detalhadas, círculos por matéria
           e resumo com 4 métricas por matéria.
      ══════════════════════════════════════════ -->
      <div class="sec" id="sec-analise">
        <div class="g4" id="an-st" style="margin-bottom:16px"></div>
        <div class="g2">
          <div>
            <div class="sh"><span class="st">Progresso Detalhado</span></div>
            <div id="an-prog"></div>
          </div>
          <div>
            <div class="sh"><span class="st">Por Matéria</span></div>
            <div id="an-circ"></div>
          </div>
        </div>
        <div class="div"></div>
        <div class="sh"><span class="st">Resumo Completo</span></div>
        <div id="an-sum"></div>
      </div>


    </div><!-- /content -->
  </main>
</div><!-- /app -->


<!--
  ================================================================
  SECÇÃO 3: JAVASCRIPT — LÓGICA E INTERATIVIDADE
  ================================================================
  O JavaScript faz a página "funcionar":
    - Responde a cliques e eventos do utilizador
    - Lê e escreve dados no localStorage do browser
    - Gera HTML dinamicamente e insere-o na página
    - Calcula percentagens, filtra listas, etc.

  CONCEITOS CHAVE usados neste código:
    - let/const   → declarar variáveis
    - arrays []   → listas de objetos
    - objetos {}  → estruturas com propriedades
    - .filter()   → filtra um array por condição
    - .map()      → transforma cada item de um array
    - .find()     → encontra um item num array
    - .push()     → adiciona um item ao final de um array
    - template literals `${}` → strings com variáveis embutidas
    - innerHTML   → insere HTML numa div
    - localStorage → memória persistente do browser
  ================================================================
-->
<script>

  // ═══════════════════════════════════════════════════════════════
  // ESTADO GLOBAL — toda a informação da app fica aqui
  // ═══════════════════════════════════════════════════════════════

  /*
    S é o objeto central da app. Contém arrays com todos os dados.
    Estrutura de cada item:
      materias:  { id, nome, prof, cor, prog }
      contents:  { id, nome, mid (materia id), week, type, done }
      blocks:    { id, mid, t1, t2, desc, day }
      tasks:     { id, txt, mid, date, done }
      projects:  { id, nome, desc, mid, week, done }
      resources: { id, nome, url, mid, tipo }
      events:    { id, title, date, mid, type }
  */
  let S = {
    materias:  [],
    contents:  [],
    blocks:    [],
    tasks:     [],
    projects:  [],
    resources: [],
    events:    []
  };

  // Carrega dados guardados do localStorage (se existirem)
  // localStorage.getItem devolve uma string JSON ou null
  try {
    const guardado = localStorage.getItem('st4');
    if (guardado) {
      S = JSON.parse(guardado); // JSON.parse converte string → objeto JS
      // Garante que arrays novos existem (compatibilidade com versões antigas)
      ['events','projects','blocks','contents','resources'].forEach(k => {
        if (!S[k]) S[k] = [];
      });
    }
  } catch(e) {
    console.log('Erro ao carregar dados:', e);
  }

  // Variáveis de estado da interface
  let cFil = 'todas';  // filtro atual dos conteúdos
  let tFil = 'todas';  // filtro atual das tarefas
  let rFil = 'todas';  // filtro atual dos recursos
  let calY = new Date().getFullYear(); // ano do calendário
  let calM = new Date().getMonth();    // mês do calendário (0=Jan)


  // ── GUARDAR ──────────────────────────────────────────────────────
  // Chamado sempre que algo muda. Converte S em JSON e guarda.
  function sv() {
    localStorage.setItem('st4', JSON.stringify(S));
    // JSON.stringify converte objeto JS → string (para guardar)
  }


  // ═══════════════════════════════════════════════════════════════
  // NAVEGAÇÃO — mudar entre páginas
  // ═══════════════════════════════════════════════════════════════

  // Mapeamento página → [título, subtítulo]
  const PM = {
    dashboard:  ['Dashboard',        'Visão geral'],
    materias:   ['Matérias',         'Disciplinas e progresso'],
    conteudos:  ['Conteúdos',        'Tópicos por semana'],
    horario:    ['Horário Semanal',  'Blocos de estudo'],
    calendario: ['Calendário',       'Vista mensal'],
    tarefas:    ['Tarefas',          'Lista de tarefas'],
    projetos:   ['Projetos',         'Projetos práticos'],
    recursos:   ['Recursos',         'Links e materiais de apoio'],
    analise:    ['Análise',          'Estatísticas completas'],
  };

  function go(pagina, botao) {
    // 1. Esconde todas as secções e desativa todos os botões
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));

    // 2. Mostra a secção correta e marca o botão como ativo
    document.getElementById('sec-' + pagina).classList.add('on');
    botao.classList.add('on');

    // 3. Atualiza o título no topbar
    document.getElementById('pt').textContent = PM[pagina][0];
    document.getElementById('ps').textContent = PM[pagina][1];

    // 4. Atualiza os selects e renderiza o conteúdo da página
    upd();
    if (pagina === 'horario')    rHor();
    if (pagina === 'conteudos')  rCont();
    if (pagina === 'tarefas')    rTasks();
    if (pagina === 'projetos')   rProj();
    if (pagina === 'recursos')   rRes();
    if (pagina === 'analise')    rAn();
    if (pagina === 'calendario') rCal();
    if (pagina === 'dashboard')  rDash();
  }

  // Alterna entre tema escuro e claro
  function toggleTheme() {
    const root = document.getElementById('html-root');
    const estaClaro = root.hasAttribute('data-light');
    // Se está claro → remove atributo (fica escuro)
    // Se está escuro → adiciona atributo (fica claro)
    estaClaro ? root.removeAttribute('data-light') : root.setAttribute('data-light', '');
    document.getElementById('ti').textContent = estaClaro ? '☀️' : '🌙';
    document.getElementById('tl').textContent = estaClaro ? 'Modo Claro' : 'Modo Escuro';
  }


  // ═══════════════════════════════════════════════════════════════
  // FUNÇÕES AUXILIARES (helpers)
  // ═══════════════════════════════════════════════════════════════

  // Converte cor HEX (#7c6af7) em RGBA com transparência
  // Exemplo: h2r('#7c6af7', 0.2) → 'rgba(124,106,247,0.2)'
  function h2r(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16); // converte base 16 → 10
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // Calcula percentagem: pc(3, 10) → 30
  function pc(feitos, total) {
    return total ? Math.round(feitos / total * 100) : 0;
  }

  // Gera HTML de um círculo de progresso SVG
  // p = percentagem (0-100), col = cor, sz = tamanho em px
  function circ(p, col, sz = 48) {
    const r = 20;                  // raio do círculo
    const c = 25;                  // centro (x e y)
    const circunf = 2 * Math.PI * r; // comprimento total da circunferência
    const dash = circunf * (p / 100); // comprimento preenchido
    return `<div class="circ" style="width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" viewBox="0 0 50 50">
        <!-- Círculo de fundo (cinzento) -->
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="5"/>
        <!-- Círculo de progresso (colorido) -->
        <!-- stroke-dasharray define quanto está preenchido -->
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${col}" stroke-width="5"
          stroke-dasharray="${dash} ${circunf}" stroke-linecap="round"/>
      </svg>
      <!-- Percentagem no centro -->
      <div class="clbl" style="font-size:${sz > 40 ? 12 : 9}px">${p}%</div>
    </div>`;
  }

  // Calcula duração de um bloco em horas
  // getH('09:00', '11:30') → 2.5
  function getH(t1, t2) {
    if (!t1 || !t2) return 0;
    const [h1, m1] = t1.split(':').map(Number);
    const [h2, m2] = t2.split(':').map(Number);
    return ((h2 * 60 + m2) - (h1 * 60 + m1)) / 60;
  }

  // Determina o período do dia pela hora de início
  function getPer(t1) {
    if (!t1) return 'tarde';
    const h = +t1.split(':')[0]; // converte string → número
    if (h < 13) return 'manhã';
    if (h < 18) return 'tarde';
    return 'noite';
  }

  // Gera as <option> para os selects de matérias
  function opts() {
    return S.materias.length
      ? S.materias.map(m => `<option value="${m.id}">${m.nome}</option>`).join('')
      : '<option>Sem matérias</option>';
  }

  // Atualiza todos os selects e badges da interface
  function upd() {
    // Preenche os dropdowns com as matérias atuais
    ['hs','cm','tm','prm','rm','em'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = opts();
    });

    // Badge de contagem de matérias
    document.getElementById('nb-m').textContent = S.materias.length;

    // Badge de tarefas pendentes (esconde se 0)
    const pendentes = S.tasks.filter(t => !t.done).length;
    const nb = document.getElementById('nb-t');
    if (nb) { nb.textContent = pendentes; nb.style.display = pendentes ? '' : 'none'; }

    // Chips de filtro de conteúdos
    const cc = document.getElementById('cc');
    if (cc) {
      cc.innerHTML =
        `<div class="chip ${cFil==='todas'?'on':''}" onclick="cfil('todas',this)" style="${cFil==='todas'?'background:var(--ac)':''}">Todas</div>`
        + S.materias.map(m =>
          `<div class="chip" onclick="cfil('${m.id}',this)" style="color:${m.cor};border-color:${m.cor}44">${m.nome}</div>`
        ).join('');
    }

    // Chips de filtro de recursos
    const rc = document.getElementById('rc');
    if (rc) {
      rc.innerHTML =
        `<div class="chip ${rFil==='todas'?'on':''}" onclick="rfil('todas',this)" style="${rFil==='todas'?'background:var(--ac)':''}">Todas</div>`
        + S.materias.map(m =>
          `<div class="chip" onclick="rfil('${m.id}',this)" style="color:${m.cor};border-color:${m.cor}44">${m.nome}</div>`
        ).join('');
    }
  }


  // ═══════════════════════════════════════════════════════════════
  // MATÉRIAS — adicionar, apagar, atualizar progresso
  // ═══════════════════════════════════════════════════════════════

  function addMat() {
    const nome = document.getElementById('mn').value.trim();
    if (!nome) return; // não faz nada se vazio

    // Cria novo objeto matéria e adiciona ao array
    S.materias.push({
      id:   Date.now(), // ID único baseado no timestamp atual
      nome: nome,
      prof: document.getElementById('mp').value.trim(),
      cor:  document.getElementById('mc').value,
      prog: 0           // progresso manual começa em 0
    });

    document.getElementById('mn').value = ''; // limpa o input
    document.getElementById('mp').value = '';
    sv(); rMat(); upd();
  }

  function delMat(id) {
    // Remove a matéria e tudo o que lhe está associado
    S.materias  = S.materias.filter(m => m.id !== id);
    S.contents  = S.contents.filter(c => c.mid !== id);
    S.tasks     = S.tasks.filter(t => t.mid !== id);
    S.projects  = S.projects.filter(p => p.mid !== id);
    S.resources = S.resources.filter(r => r.mid !== id);
    S.blocks    = S.blocks.filter(b => b.mid !== id);
    sv(); rMat(); upd();
  }

  // Atualiza o progresso manual (slider) de uma matéria
  function setMp(id, valor) {
    const m = S.materias.find(m => m.id === id);
    if (m) { m.prog = +valor; sv(); } // + converte string → número
  }

  function rMat() {
    const el = document.getElementById('mat-list');
    if (!S.materias.length) {
      el.innerHTML = `<div class="empty"><div class="ei">📚</div>Sem matérias ainda.</div>`;
      return;
    }
    // .map() transforma cada matéria numa string HTML
    el.innerHTML = S.materias.map(m => {
      const contTotal = S.contents.filter(c => c.mid === m.id);
      const contFeitos = contTotal.filter(c => c.done).length;
      const taskTotal = S.tasks.filter(t => t.mid === m.id);
      const taskFeitas = taskTotal.filter(t => t.done).length;
      // Usa o progresso manual (slider) se definido, senão calcula pelos conteúdos
      const p = m.prog || pc(contFeitos + taskFeitas, contTotal.length + taskTotal.length);

      return `<div class="subi">
        <div class="dot" style="background:${m.cor}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${m.nome}</div>
          ${m.prof ? `<div style="font-size:10px;color:var(--tx3)">Prof. ${m.prof}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:7px;min-width:150px">
          <span style="font-size:10px;color:var(--tx3)">${contFeitos}/${contTotal.length} tópicos</span>
          <!-- oninput atualiza em tempo real enquanto arrasta o slider -->
          <input type="range" min="0" max="100" value="${p}" style="flex:1;accent-color:${m.cor}"
            oninput="setMp(${m.id},this.value);this.nextSibling.textContent=this.value+'%'"
            onchange="sv();rMat()"/>
          <span style="font-size:10px;color:${m.cor};min-width:28px">${p}%</span>
        </div>
        ${circ(p, m.cor, 40)}
        <button class="bx" onclick="delMat(${m.id})">×</button>
      </div>`;
    }).join(''); // join('') junta todas as strings sem separador
  }


  // ═══════════════════════════════════════════════════════════════
  // CONTEÚDOS — tópicos de estudo por semana
  // ═══════════════════════════════════════════════════════════════

  function addCont() {
    const nome = document.getElementById('cn').value.trim();
    if (!nome || !S.materias.length) return;

    S.contents.push({
      id:   Date.now(),
      nome: nome,
      mid:  +document.getElementById('cm').value,    // + converte para número
      week: +document.getElementById('cw').value || 1,
      type: document.getElementById('ct2').value,
      done: false
    });
    document.getElementById('cn').value = '';
    sv(); rCont(); rMat();
  }

  // Alterna estado feito/não feito de um conteúdo
  function togCont(id) {
    const c = S.contents.find(c => c.id === id);
    if (c) { c.done = !c.done; sv(); rCont(); rMat(); upd(); }
  }

  function delCont(id) {
    S.contents = S.contents.filter(c => c.id !== id);
    sv(); rCont(); rMat();
  }

  // Muda o filtro de conteúdos (por estado ou por matéria)
  function cfil(filtro, btn) {
    cFil = filtro;
    // Remove .on de todos os chips e adiciona ao clicado
    document.querySelectorAll('#cc .chip').forEach(c => { c.classList.remove('on'); c.style.background = ''; });
    btn.classList.add('on');
    btn.style.background = filtro === 'todas' ? 'var(--ac)' : (S.materias.find(m => m.id == filtro) || {cor:'var(--ac)'}).cor;
    rCont();
  }

  function rCont() {
    const el = document.getElementById('cont-list');
    let lista = S.contents;

    // Aplica filtro por estado
    if (cFil === 'pendentes') lista = lista.filter(c => !c.done);
    else if (cFil === 'feitos') lista = lista.filter(c => c.done);
    else if (cFil !== 'todas') lista = lista.filter(c => c.mid == cFil); // por matéria

    // Ordena por semana crescente
    lista = [...lista].sort((a, b) => a.week - b.week);

    if (!lista.length) { el.innerHTML = `<div class="empty"><div class="ei">📋</div>Sem conteúdos.</div>`; return; }

    // Agrupa por semana usando um objeto { '1': [...], '2': [...], ... }
    const porSemana = {};
    lista.forEach(c => {
      if (!porSemana[c.week]) porSemana[c.week] = [];
      porSemana[c.week].push(c);
    });

    // Gera HTML para cada grupo de semana
    el.innerHTML = Object.keys(porSemana).sort((a,b) => +a - +b).map(sem => {
      return `<div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Semana ${sem}</div>
        ${porSemana[sem].map(c => {
          const m = S.materias.find(m => m.id === c.mid);
          const corTipo = c.type === 'obrigatorio' ? 'var(--rd)' : c.type === 'revisao' ? 'var(--am)' : 'var(--gn)';
          return `<div class="ti ${c.done ? 'dn' : ''}">
            <input type="checkbox" ${c.done ? 'checked' : ''} onchange="togCont(${c.id})"/>
            <div style="flex:1">
              <div class="tx">${c.nome}</div>
              <div class="meta">${m ? `<span style="color:${m.cor};font-weight:600">${m.nome}</span> · ` : ''}S${c.week} · <span style="color:${corTipo};font-weight:600">${c.type}</span></div>
            </div>
            <button class="bx" onclick="delCont(${c.id})">×</button>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }


  // ═══════════════════════════════════════════════════════════════
  // HORÁRIO — blocos de estudo semanais
  // ═══════════════════════════════════════════════════════════════

  const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

  function addBlock() {
    if (!S.materias.length) return;
    S.blocks.push({
      id:   Date.now(),
      mid:  +document.getElementById('hs').value,
      t1:   document.getElementById('ht1').value,   // hora início (ex: "09:00")
      t2:   document.getElementById('ht2').value,   // hora fim   (ex: "11:00")
      desc: document.getElementById('hd2').value.trim(),
      day:  +document.getElementById('hd').value    // 0=Segunda, 1=Terça, ...
    });
    document.getElementById('hd2').value = '';
    sv(); rHor();
  }

  function delBlock(id) {
    S.blocks = S.blocks.filter(b => b.id !== id);
    sv(); rHor();
  }

  function rHor() {
    // Atualiza legenda de cores
    document.getElementById('hor-leg').innerHTML =
      S.materias.map(m => `<div class="legi"><div class="legd" style="background:${m.cor}"></div>${m.nome}</div>`).join('');

    // Gera as 5 colunas (Seg-Sex)
    document.getElementById('hor-grid').innerHTML = [0,1,2,3,4].map(di => {
      // Blocos deste dia, ordenados por hora
      const blocosDia = S.blocks.filter(b => b.day === di).sort((a,b) => a.t1.localeCompare(b.t1));
      const totalHoras = blocosDia.reduce((s, b) => s + getH(b.t1, b.t2), 0);

      return `<div class="sdcard">
        <div class="sdtitle">${DIAS[di]}</div>
        <div class="sdh">${totalHoras > 0 ? totalHoras.toFixed(1) + 'h de estudo' : 'Sem blocos'}</div>
        ${['manhã','tarde','noite'].map(per => {
          const blocosPer = blocosDia.filter(b => getPer(b.t1) === per);
          if (!blocosPer.length) return '';
          const corPer  = per === 'manhã' ? 'var(--am)' : per === 'tarde' ? 'var(--tl)' : 'var(--bl)';
          const iconPer = per === 'manhã' ? '☀️' : per === 'tarde' ? '🌤' : '🌙';
          return `
            <div class="sper" style="color:${corPer}">${iconPer} ${per.toUpperCase()}</div>
            ${blocosPer.map(b => {
              const m = S.materias.find(m => m.id === b.mid);
              if (!m) return '';
              const h = getH(b.t1, b.t2);
              return `<div class="sblk" style="background:${h2r(m.cor,0.13)};border-color:${h2r(m.cor,0.28)}">
                <div class="sbn" style="color:${m.cor}">${m.nome}</div>
                <div class="sbt" style="color:${m.cor}">${b.t1}–${b.t2}</div>
                ${b.desc ? `<div class="sbd" style="color:var(--tx2)">${b.desc}</div>` : ''}
                <div class="sbr" style="color:${m.cor}">⏱ ${h > 0 ? h.toFixed(1) + 'h' : ''}</div>
                <button class="bx" style="position:absolute;right:3px;top:3px;font-size:13px" onclick="delBlock(${b.id})">×</button>
              </div>`;
            }).join('')}`;
        }).join('')}
        ${!blocosDia.length ? `<div style="font-size:11px;color:var(--tx3);padding:6px 0">Dia livre</div>` : ''}
      </div>`;
    }).join('');
  }


  // ═══════════════════════════════════════════════════════════════
  // CALENDÁRIO — vista mensal com navegação
  // ═══════════════════════════════════════════════════════════════

  // Navega para o mês anterior (-1) ou seguinte (+1)
  function calNav(delta) {
    calM += delta;
    if (calM > 11) { calM = 0; calY++; }  // passa para o ano seguinte
    if (calM < 0)  { calM = 11; calY--; } // volta para o ano anterior
    rCal();
  }

  function calToday() {
    calY = new Date().getFullYear();
    calM = new Date().getMonth();
    rCal();
  }

  function addEv() {
    const titulo = document.getElementById('et').value.trim();
    if (!titulo) return;
    const mid = document.getElementById('em').value;
    S.events.push({
      id:    Date.now(),
      title: titulo,
      date:  document.getElementById('ed').value, // formato "YYYY-MM-DD"
      mid:   mid ? +mid : null,
      type:  document.getElementById('ety').value
    });
    document.getElementById('et').value = '';
    sv(); rCal();
  }

  function delEv(id) {
    S.events = S.events.filter(e => e.id !== id);
    sv(); rCal();
  }

  function rCal() {
    const nomesDosMeses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    document.getElementById('cmon').textContent = `${nomesDosMeses[calM]} ${calY}`;

    const hoje = new Date();
    const primeiroDia = new Date(calY, calM, 1).getDay();   // dia da semana do dia 1
    const diasNoMes   = new Date(calY, calM + 1, 0).getDate(); // nº de dias no mês
    const offset = primeiroDia === 0 ? 6 : primeiroDia - 1; // ajuste para segunda-feira = 0
    const diasMesAnterior = new Date(calY, calM, 0).getDate();

    let html = '';

    // Cabeçalhos dos dias da semana
    ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].forEach(d => html += `<div class="cdow">${d}</div>`);

    // Dias do mês anterior (aparecem a cinzento)
    for (let i = 0; i < offset; i++) {
      html += `<div class="cday om"><div class="cdn">${diasMesAnterior - offset + 1 + i}</div></div>`;
    }

    // Dias do mês atual
    for (let d = 1; d <= diasNoMes; d++) {
      // Formata data como "YYYY-MM-DD" para comparar com os eventos
      const dataStr = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const eHoje = hoje.getFullYear() === calY && hoje.getMonth() === calM && hoje.getDate() === d;

      // Encontra eventos e tarefas neste dia
      const evsDia   = S.events.filter(e => e.date === dataStr);
      const tasksDia = S.tasks.filter(t => t.date === dataStr && !t.done)
                               .map(t => ({...t, title: t.txt, type: 'tarefa'}));
      const todos = [...evsDia, ...tasksDia];
      const mostrar = todos.slice(0, 3);     // mostra no máximo 3
      const mais    = todos.length - mostrar.length; // "+2 mais"

      html += `<div class="cday${eHoje ? ' td' : ''}">
        <div class="cdn" style="color:${eHoje ? 'var(--ac2)' : 'var(--tx)'}">${d}</div>
        ${mostrar.map(e => {
          const m = S.materias.find(m => m.id === e.mid);
          const cor = m ? m.cor : e.type === 'teste' ? 'var(--rd)' : e.type === 'entrega' ? 'var(--am)' : 'var(--ac)';
          return `<div class="cev" style="background:${cor}">${e.title}</div>`;
        }).join('')}
        ${mais > 0 ? `<div class="cmr">+${mais}</div>` : ''}
      </div>`;
    }

    // Dias do mês seguinte para completar a grelha
    const restantes = (7 - ((offset + diasNoMes) % 7)) % 7;
    for (let i = 1; i <= restantes; i++) {
      html += `<div class="cday om"><div class="cdn">${i}</div></div>`;
    }

    document.getElementById('cgrid').innerHTML = html;

    // Lista de eventos do mês atual abaixo do calendário
    const evEl = document.getElementById('ev-list');
    const evsMes = S.events
      .filter(e => e.date && e.date.startsWith(`${calY}-${String(calM+1).padStart(2,'0')}`))
      .sort((a, b) => a.date.localeCompare(b.date));

    if (!evsMes.length) {
      evEl.innerHTML = `<div class="empty"><div class="ei">📅</div>Sem eventos este mês.</div>`;
      return;
    }

    evEl.innerHTML = `<div class="sh" style="margin-top:8px"><span class="st">Eventos deste mês</span></div>`
      + evsMes.map(e => {
          const m = S.materias.find(m => m.id === e.mid);
          const corTipo = e.type === 'teste' ? 'var(--rd)' : e.type === 'entrega' ? 'var(--am)' : 'var(--ac)';
          return `<div class="ti">
            <span style="font-size:13px">${e.type === 'teste' ? '📝' : e.type === 'entrega' ? '📤' : '📌'}</span>
            <span class="tx">${e.title}</span>
            <span class="tdt">${e.date}</span>
            ${m ? `<span class="tag" style="background:${m.cor}">${m.nome}</span>` : ''}
            <span class="tag" style="background:${corTipo}">${e.type}</span>
            <button class="bx" onclick="delEv(${e.id})">×</button>
          </div>`;
        }).join('');
  }


  // ═══════════════════════════════════════════════════════════════
  // TAREFAS — checklist com data e matéria
  // ═══════════════════════════════════════════════════════════════

  function addTask() {
    const txt = document.getElementById('tn').value.trim();
    if (!txt) return;
    const mid = document.getElementById('tm').value;
    S.tasks.push({
      id:   Date.now(),
      txt:  txt,
      mid:  mid ? +mid : null,
      date: document.getElementById('tdd').value,
      done: false
    });
    document.getElementById('tn').value = '';
    sv(); rTasks(); rMat(); upd();
  }

  function togTask(id) {
    const t = S.tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; sv(); rTasks(); upd(); }
  }

  function delTask(id) {
    S.tasks = S.tasks.filter(t => t.id !== id);
    sv(); rTasks(); rMat(); upd();
  }

  // Filtra por estado (todas/pendentes/feitas)
  function tfil(filtro, btn) {
    tFil = filtro;
    document.querySelectorAll('#sec-tarefas .tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    rTasks();
  }

  function rTasks() {
    const el = document.getElementById('task-list');
    let lista = S.tasks;
    if (tFil === 'pendentes') lista = lista.filter(t => !t.done);
    if (tFil === 'feitas')    lista = lista.filter(t => t.done);

    if (!lista.length) { el.innerHTML = `<div class="empty"><div class="ei">✅</div>Tudo limpo!</div>`; return; }

    el.innerHTML = lista.map(t => {
      const m = S.materias.find(m => m.id === t.mid);
      // Verifica se a tarefa está atrasada (data passada e não concluída)
      const atrasada = t.date && !t.done && new Date(t.date) < new Date();
      return `<div class="ti ${t.done ? 'dn' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="togTask(${t.id})"/>
        <span class="tx">${t.txt}</span>
        ${t.date ? `<span class="tdt" style="color:${atrasada ? 'var(--rd)' : 'var(--tx3)'}">📅 ${t.date}</span>` : ''}
        ${m ? `<span class="tag" style="background:${m.cor}">${m.nome}</span>` : ''}
        <button class="bx" onclick="delTask(${t.id})">×</button>
      </div>`;
    }).join('');
  }


  // ═══════════════════════════════════════════════════════════════
  // PROJETOS — cards clicáveis de projetos práticos
  // ═══════════════════════════════════════════════════════════════

  function addProj() {
    const nome = document.getElementById('prn').value.trim();
    if (!nome) return;
    const mid = document.getElementById('prm').value;
    S.projects.push({
      id:   Date.now(),
      nome: nome,
      desc: document.getElementById('prd').value.trim(),
      mid:  mid ? +mid : null,
      week: +document.getElementById('prw').value || 1,
      done: false
    });
    document.getElementById('prn').value = '';
    document.getElementById('prd').value = '';
    sv(); rProj();
  }

  // Clicar no card alterna feito/não feito
  function togProj(id) {
    const p = S.projects.find(p => p.id === id);
    if (p) { p.done = !p.done; sv(); rProj(); }
  }

  function delProj(id) {
    S.projects = S.projects.filter(p => p.id !== id);
    sv(); rProj();
  }

  function rProj() {
    const total = S.projects.length;
    const feitos = S.projects.filter(p => p.done).length;

    // Barra de progresso global dos projetos
    document.getElementById('proj-st').innerHTML = total
      ? `<div class="card cdsm" style="background:var(--bg3);border-left:3px solid var(--ac)">
          <span style="font-size:13px;font-weight:600">🚀 ${feitos}/${total} projetos concluídos</span>
          <div style="margin-top:7px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden">
            <div style="width:${pc(feitos,total)}%;height:100%;background:var(--ac);border-radius:3px;transition:width .5s"></div>
          </div>
        </div>` : '';

    const el = document.getElementById('proj-list');
    if (!S.projects.length) { el.innerHTML = `<div class="empty"><div class="ei">🚀</div>Sem projetos ainda.</div>`; return; }

    el.innerHTML = `<div class="g2">
      ${S.projects.map(p => {
        const m = S.materias.find(m => m.id === p.mid);
        return `<div class="pc ${p.done ? 'dn' : ''}" onclick="togProj(${p.id})">
          <div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:7px">
            <div class="pch">${p.done ? '✓' : ''}</div>
            <div style="flex:1">
              <div class="pname">${p.nome}</div>
              ${m ? `<div style="margin-top:2px"><span class="tag" style="background:${m.cor};font-size:9px;padding:1px 6px">${m.nome}</span></div>` : ''}
            </div>
            <!-- event.stopPropagation() evita que o clique no × active togProj -->
            <button class="bx" onclick="event.stopPropagation();delProj(${p.id})">×</button>
          </div>
          ${p.desc ? `<div class="pdesc">${p.desc}</div>` : ''}
          <div class="pmeta">⏱ A partir da semana ${p.week}</div>
        </div>`;
      }).join('')}
    </div>`;
  }


  // ═══════════════════════════════════════════════════════════════
  // RECURSOS — links e materiais de apoio
  // ═══════════════════════════════════════════════════════════════

  function addRes() {
    const nome = document.getElementById('rn').value.trim();
    if (!nome) return;
    const mid = document.getElementById('rm').value;
    S.resources.push({
      id:   Date.now(),
      nome: nome,
      url:  document.getElementById('ru').value.trim(),
      mid:  mid ? +mid : null,
      tipo: document.getElementById('rtp').value  // emoji do tipo
    });
    document.getElementById('rn').value = '';
    document.getElementById('ru').value = '';
    sv(); rRes();
  }

  function delRes(id) {
    S.resources = S.resources.filter(r => r.id !== id);
    sv(); rRes();
  }

  function rfil(filtro, btn) {
    rFil = filtro;
    document.querySelectorAll('#rc .chip').forEach(c => { c.classList.remove('on'); c.style.background = ''; });
    btn.classList.add('on');
    btn.style.background = filtro === 'todas' ? 'var(--ac)' : (S.materias.find(m => m.id == filtro) || {cor:'var(--ac)'}).cor;
    rRes();
  }

  function rRes() {
    upd();
    const el = document.getElementById('res-list');
    let lista = S.resources;
    if (rFil !== 'todas') lista = lista.filter(r => r.mid == rFil);

    if (!lista.length) { el.innerHTML = `<div class="empty"><div class="ei">🔗</div>Sem recursos ainda.</div>`; return; }

    el.innerHTML = lista.map(r => {
      const m = S.materias.find(m => m.id === r.mid);
      return `<div class="ri">
        <div class="ric" style="background:${m ? h2r(m.cor, 0.14) : 'var(--bg3)'}">${r.tipo}</div>
        <div class="rif">
          <div class="rit">${r.nome}</div>
          ${r.url ? `<a class="riu" href="${r.url}" target="_blank">${r.url}</a>` : '<span class="riu">sem link</span>'}
        </div>
        ${m ? `<span class="tag" style="background:${m.cor}">${m.nome}</span>` : ''}
        <button class="bx" onclick="delRes(${r.id})">×</button>
      </div>`;
    }).join('');
  }


  // ═══════════════════════════════════════════════════════════════
  // ANÁLISE — estatísticas completas
  // ═══════════════════════════════════════════════════════════════

  function rAn() {
    // Calcula totais globais
    const ct = S.contents.length,  cd = S.contents.filter(c => c.done).length;
    const tt = S.tasks.length,     td = S.tasks.filter(t => t.done).length;
    const pt = S.projects.length,  pd = S.projects.filter(p => p.done).length;
    const totalHoras = S.blocks.reduce((soma, b) => soma + getH(b.t1, b.t2), 0);
    const atrasadas  = S.tasks.filter(t => t.date && !t.done && new Date(t.date) < new Date()).length;
    const progressoGlobal = pc(cd + td, ct + tt);

    // 4 cards de estatísticas
    document.getElementById('an-st').innerHTML = `
      <div class="sc"><div class="sl">Progresso Global</div><div class="sn" style="color:var(--ac)">${progressoGlobal}%</div><div class="ss">${cd+td}/${ct+tt} itens</div></div>
      <div class="sc"><div class="sl">Conteúdos</div><div class="sn" style="color:var(--tl)">${cd}/${ct}</div><div class="ss">concluídos</div></div>
      <div class="sc"><div class="sl">Horas/Semana</div><div class="sn" style="color:var(--bl)">${totalHoras.toFixed(1)}h</div><div class="ss">${S.blocks.length} blocos</div></div>
      <div class="sc"><div class="sl">Projetos</div><div class="sn" style="color:${pd===pt&&pt>0?'var(--gn)':'var(--am)'}">${pd}/${pt}</div><div class="ss">${atrasadas} atrasadas</div></div>`;

    // Barras de progresso por matéria
    const ap = document.getElementById('an-prog');
    if (!S.materias.length) { ap.innerHTML = `<div class="empty">Sem matérias.</div>`; }
    else ap.innerHTML = S.materias.map(m => {
      const mc = S.contents.filter(c => c.mid === m.id), mcd = mc.filter(c => c.done).length;
      const mt = S.tasks.filter(t => t.mid === m.id),   mtd = mt.filter(t => t.done).length;
      const p = m.prog || pc(mcd + mtd, mc.length + mt.length);
      return `<div class="pr">
        <div class="ph"><span class="pn" style="color:${m.cor}">${m.nome}</span><span class="pp">${mcd}/${mc.length} tópicos · ${p}%</span></div>
        <div class="pt"><div class="pf" style="width:${p}%;background:${m.cor}"></div></div>
      </div>`;
    }).join('');

    // Círculos de progresso por matéria
    const ac = document.getElementById('an-circ');
    if (!S.materias.length) { ac.innerHTML = `<div class="empty">Sem dados.</div>`; }
    else ac.innerHTML = S.materias.map(m => {
      const mc = S.contents.filter(c => c.mid === m.id), mcd = mc.filter(c => c.done).length;
      const mt = S.tasks.filter(t => t.mid === m.id),   mtd = mt.filter(t => t.done).length;
      const bh = S.blocks.filter(b => b.mid === m.id).reduce((s, b) => s + getH(b.t1, b.t2), 0);
      const p = m.prog || pc(mcd + mtd, mc.length + mt.length);
      return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
        ${circ(p, m.cor, 46)}
        <div>
          <div style="font-size:12px;font-weight:600;color:${m.cor}">${m.nome}</div>
          <div style="font-size:10px;color:var(--tx3);margin-top:1px">${mc.length} tópicos · ${mt.length} tarefas · ${bh.toFixed(1)}h/sem</div>
        </div>
      </div>`;
    }).join('');

    // Resumo completo com cards por matéria (4 métricas cada)
    document.getElementById('an-sum').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px">
        ${S.materias.map(m => {
          const mc = S.contents.filter(c => c.mid === m.id), mcd = mc.filter(c => c.done).length;
          const mt = S.tasks.filter(t => t.mid === m.id),   mtd = mt.filter(t => t.done).length;
          const mp = S.projects.filter(p => p.mid === m.id), mpd = mp.filter(p => p.done).length;
          const bh = S.blocks.filter(b => b.mid === m.id).reduce((s, b) => s + getH(b.t1, b.t2), 0);
          const p = m.prog || pc(mcd + mtd, mc.length + mt.length);
          return `<div class="card cdsm" style="border-left:3px solid ${m.cor}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-weight:700;font-size:12px;color:${m.cor}">${m.nome}</span>
              <span style="font-family:var(--df);font-size:17px;font-weight:700">${p}%</span>
            </div>
            ${m.prof ? `<div style="font-size:10px;color:var(--tx3);margin-bottom:4px">Prof. ${m.prof}</div>` : ''}
            <div class="pt" style="margin-bottom:7px"><div class="pf" style="width:${p}%;background:${m.cor}"></div></div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;text-align:center">
              <div><div style="font-size:13px;font-weight:700">${mcd}/${mc.length}</div><div style="font-size:9px;color:var(--tx3)">tópicos</div></div>
              <div><div style="font-size:13px;font-weight:700">${mtd}/${mt.length}</div><div style="font-size:9px;color:var(--tx3)">tarefas</div></div>
              <div><div style="font-size:13px;font-weight:700">${mpd}/${mp.length}</div><div style="font-size:9px;color:var(--tx3)">projetos</div></div>
              <div><div style="font-size:13px;font-weight:700">${bh.toFixed(1)}h</div><div style="font-size:9px;color:var(--tx3)">semanal</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }


  // ═══════════════════════════════════════════════════════════════
  // DASHBOARD — visão geral
