  // ═══════════════════════════════════════════════════════════════

  function rDash() {
    const ct = S.contents.length, cd = S.contents.filter(c => c.done).length;
    const tt = S.tasks.length,    td = S.tasks.filter(t => t.done).length;
    const progressoGlobal = pc(cd + td, ct + tt);
    const atrasadas = S.tasks.filter(t => t.date && !t.done && new Date(t.date) < new Date()).length;
    const totalHoras = S.blocks.reduce((s, b) => s + getH(b.t1, b.t2), 0);

    // 4 cards no topo — o primeiro tem o círculo de progresso
    document.getElementById('d-stats').innerHTML = `
      <div class="sc">
        <div style="display:flex;align-items:center;gap:9px;margin-top:3px">
          ${circ(progressoGlobal, 'var(--ac)', 50)}
          <div>
            <div class="sn" style="font-size:20px;color:var(--ac)">${progressoGlobal}%</div>
            <div class="ss">progresso global</div>
          </div>
        </div>
      </div>
      <div class="sc"><div class="sl">Matérias</div><div class="sn" style="color:var(--tl)">${S.materias.length}</div><div class="ss">${S.resources.length} recursos</div></div>
      <div class="sc"><div class="sl">Horas/Semana</div><div class="sn" style="color:var(--bl)">${totalHoras.toFixed(1)}h</div><div class="ss">${S.blocks.length} blocos</div></div>
      <div class="sc"><div class="sl">Projetos</div><div class="sn" style="color:var(--am)">${S.projects.filter(p=>p.done).length}/${S.projects.length}</div><div class="ss">${atrasadas} atrasadas</div></div>`;

    // Barras de progresso por matéria (calculado pelos conteúdos)
    const dp = document.getElementById('d-prog');
    if (!S.materias.length) {
      dp.innerHTML = `<div class="empty"><div class="ei">📚</div>Adiciona matérias!</div>`;
    } else {
      dp.innerHTML = S.materias.map(m => {
        const mc = S.contents.filter(c => c.mid === m.id), mcd = mc.filter(c => c.done).length;
        const p = m.prog || pc(mcd, mc.length);
        return `<div class="pr">
          <div class="ph"><span class="pn" style="color:${m.cor}">${m.nome}</span><span class="pp">${p}%</span></div>
          <div class="pt"><div class="pf" style="width:${p}%;background:${m.cor}"></div></div>
        </div>`;
      }).join('');
    }

    // Tarefas pendentes (máx 5)
    const dt = document.getElementById('d-tasks');
    const pendentes = S.tasks.filter(t => !t.done).slice(0, 5);
    if (!pendentes.length) {
      dt.innerHTML = `<div class="empty"><div class="ei">🎉</div>Sem pendências!</div>`;
    } else {
      dt.innerHTML = pendentes.map(t => {
        const m = S.materias.find(m => m.id === t.mid);
        const atrasada = t.date && new Date(t.date) < new Date();
        return `<div class="ti">
          <input type="checkbox" onchange="togTask(${t.id});rDash()"/>
          <span class="tx">${t.txt}</span>
          ${t.date ? `<span class="tdt" style="color:${atrasada ? 'var(--rd)' : 'var(--tx3)'}">📅 ${t.date}</span>` : ''}
          ${m ? `<span class="tag" style="background:${m.cor}">${m.nome}</span>` : ''}
        </div>`;
      }).join('');
    }

    // Conteúdos pendentes (máx 6, em 2 colunas)
    const dc = document.getElementById('d-cont');
    const contPend = S.contents.filter(c => !c.done).slice(0, 6);
    if (!contPend.length) {
      dc.innerHTML = `<div class="empty"><div class="ei">📋</div>Sem conteúdos pendentes.</div>`;
    } else {
      dc.innerHTML = `<div class="g2">
        ${contPend.map(c => {
          const m = S.materias.find(m => m.id === c.mid);
          return `<div class="ti">
            <input type="checkbox" onchange="togCont(${c.id});rDash()"/>
            <div>
              <div class="tx">${c.nome}</div>
              <div class="meta">${m ? `<span style="color:${m.cor}">${m.nome}</span> · ` : ''}S${c.week}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }
  }


  // ═══════════════════════════════════════════════════════════════
  // INICIALIZAÇÃO — corre quando a página carrega
  // ═══════════════════════════════════════════════════════════════
  rMat();   // renderiza a lista de matérias
  upd();    // atualiza selects e badges
  rDash();  // renderiza o dashboard inicial

</script>

<script>

  // ═══════════════════════════════════════════════════════════════
  // NAVEGAÇÃO MOBILE — tab bar em baixo
  // ═══════════════════════════════════════════════════════════════

  // IDs das tabs principais (que têm botão próprio na tab bar)
  const TAB_BAR_PAGES = ['dashboard','conteudos','horario','tarefas'];

  function goMobile(page) {
    // Encontra o botão na sidebar que corresponde a esta página
    // e usa o go() normal para mudar de secção
    const sideBtn = document.querySelector('.nb.on');
    // Limpa todas as tabs da tab bar
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('on'));
    // Marca a tab correta como ativa (se existir na tab bar)
    const tb = document.getElementById('tb-' + page);
    if (tb) tb.classList.add('on');
    else document.getElementById('tb-mais').classList.add('on');
    // Navega — procura o botão da sidebar para esta página
    const nbBtns = document.querySelectorAll('.nb');
    let found = null;
    nbBtns.forEach(b => {
      if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + page + "'")) found = b;
    });
    if (found) go(page, found);
  }

  function toggleMobileMenu() {
    const mm = document.getElementById('mobile-menu');
    mm.style.display = mm.style.display === 'none' ? 'block' : 'none';
  }

  function closeMM() {
    document.getElementById('mobile-menu').style.display = 'none';
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('on'));
    document.getElementById('tb-mais').classList.add('on');
  }

  // Fecha o menu "Mais" ao clicar fora dele
  document.addEventListener('click', function(e) {
    const mm = document.getElementById('mobile-menu');
    const tb = document.querySelector('.tab-bar');
    if (mm && tb && !mm.contains(e.target) && !tb.contains(e.target)) {
      mm.style.display = 'none';
    }
  });

  // Sincroniza o botão de tema mobile com o desktop
  const origToggleTheme = toggleTheme;
  function toggleTheme() {
    origToggleTheme();
    // Sincroniza o ícone do botão mobile
    const ti2 = document.getElementById('ti2');
    const isDark = !document.getElementById('html-root').hasAttribute('data-light');
    if (ti2) ti2.textContent = isDark ? '☀️' : '🌙';
  }

</script>
</body>
</html>
